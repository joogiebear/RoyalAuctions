name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag 2026.28  &&  git push origin 2026.28
#   (a leading "v" is also accepted, e.g. v2026.28)
on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set project version to the tag
        run: mvn -B versions:set -DnewVersion=${{ steps.ver.outputs.version }} -DgenerateBackupPoms=false

      - name: Build
        run: mvn -B -DskipTests package

      - name: Name the jar with the version
        run: cp target/RoyalAuctions.jar RoyalAuctions-${{ steps.ver.outputs.version }}.jar

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "RoyalAuctions-${{ steps.ver.outputs.version }}.jar" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
