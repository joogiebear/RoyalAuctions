# =====================================================================
#  RoyalAuctions - Hypixel-style Auction House
# =====================================================================

# ---------------------------------------------------------------------
# Storage
#   type: SQLITE (single server, zero setup) or MYSQL (network / shared)
# ---------------------------------------------------------------------
storage:
  type: SQLITE
  # Only used when type: MYSQL
  mysql:
    host: localhost
    port: 3306
    database: royalauctions
    username: root
    password: ""
    # Extra JDBC params appended to the connection URL.
    properties: "useSSL=false&characterEncoding=utf8&allowPublicKeyRetrieval=true"
    pool-size: 10
  # SQLite file name (stored in the plugin folder). Only used when type: SQLITE.
  sqlite-file: auctions.db

# ---------------------------------------------------------------------
# Listing rules
# ---------------------------------------------------------------------
listings:
  # Auctions/listings are created entirely through the GUI (open with /ah, click
  # "Create Auction"). The seller deposits the item, sets a price by typing it in
  # chat, picks a duration, toggles Buy-It-Now vs Auction, then confirms.

  # Selectable listing durations shown on the "Auction Duration" screen.
  durations:
    - label: "1 Hour"
      hours: 1
      icon: RED_TERRACOTTA
    - label: "6 Hours"
      hours: 6
      icon: ORANGE_TERRACOTTA
    - label: "12 Hours"
      hours: 12
      icon: YELLOW_TERRACOTTA
    - label: "1 Day"
      hours: 24
      icon: LIME_TERRACOTTA
    - label: "2 Days"
      hours: 48
      icon: PINK_TERRACOTTA
  # Duration a new listing defaults to (must match one of the hours values above).
  default-duration-hours: 24
  # Default type a new listing opens as: BIN (buy-it-now) or AUCTION (bidding).
  default-type: BIN
  # Maximum active listings a player may have at once (permission
  # royalauctions.limit.<n> overrides this; -1 = unlimited).
  max-per-player: 7
  # Price bounds (in Vault currency). max-price: -1 disables the upper bound.
  min-price: 1.0
  max-price: -1
  # Listing fee charged to the seller when posting.
  #   percent: fraction of the sale price (0.02 = 2%)
  #   minimum: floor for the fee regardless of percent
  # The fee is non-refundable and is taken immediately on listing.
  fee:
    percent: 0.02
    minimum: 5.0
  # If true, buying an item deposits it straight into the buyer's inventory
  # when there is room, only overflowing to the collection when full.
  # If false, all purchases go to the collection to be claimed manually.
  instant-deliver-purchases: true

# ---------------------------------------------------------------------
# Bidding (AUCTION listings)
# ---------------------------------------------------------------------
bidding:
  # Each new bid must beat the current bid by at least the larger of a flat
  # amount and a percentage of the current bid.
  min-increment: 10.0
  increment-percent: 0.05
  # When someone is outbid their money is refunded automatically. When an
  # auction ends the highest bidder wins and the seller is paid the winning bid.

# ---------------------------------------------------------------------
# GUI / Menus
#
# Every menu — its title, size, filler, sounds, and each button's slot,
# material, name, lore and click action — is configured per-menu in the
# gui/ folder:
#   gui/browse.yml           the Auction Browser
#   gui/create.yml           the Create Auction screen
#   gui/duration.yml         the Auction Duration picker
#   gui/confirm-purchase.yml Buy-It-Now confirmation
#   gui/confirm-auction.yml  final auction confirmation
#   gui/bid.yml              the Place Bid screen
#   gui/collection.yml       claim purchases / returned items
#   gui/manage.yml           your active listings
# Edit those files and run /ah reload to apply changes.
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# Categories (Hypixel-style tabs)
#
# Items are tested against each category in ascending `priority` order and
# placed in the FIRST one that matches. Always keep a final catch-all
# category (a `misc` with match.any: true) so nothing is uncategorised.
#
# Match rules (any rule that is present must be satisfied; a category with
# multiple rule types matches if ANY rule type matches):
#   eco-namespaces   : list of eco plugin namespaces the item belongs to,
#                      e.g. [talismans], [reforges], [ecoarmor], [ecoitems]
#   materials        : exact Bukkit material names
#   material-suffixes: material name ends with any of these (e.g. _SWORD)
#   material-prefixes: material name starts with any of these
#   tags             : built-in flags: EDIBLE, BLOCK, ARMOR, TOOL, WEAPON
#   any              : true = catch-all (matches everything)
# ---------------------------------------------------------------------
# ---------------------------------------------------------------------
# How categories resolve
#
# Order of resolution for every item:
#   1. match.items:          an exact pin ("ecoitems:brazen_sword", "minecraft:trident").
#                            Wins over EVERY other rule, in any category, at any priority.
#   2. match.eco-namespaces: a whole eco plugin -> one category (talismans, ecoarmor, ...)
#   3. match.materials / material-suffixes / material-prefixes / tags
#                            inferred from the item's BASE material. This is only ever a guess
#                            for custom items: a custom sword built on a STICK would land in Misc.
#   4. match.any: true       the catch-all.
#
# Two tools so none of this is a black box:
#   * /ah category  (while holding an item) tells you where it lands and WHICH rule decided it.
#   * On startup, every eco item that only hit the catch-all is logged, so you know exactly
#     which items are worth pinning, instead of enumerating every material in the game.
# ---------------------------------------------------------------------
category-options:
  # true  = NO inference at all. Only items explicitly pinned via match.items: get a category;
  #         everything else falls to the catch-all. For servers that want zero guessing.
  # false = pins first, then the rules above. Recommended: works out of the box.
  strict-items: false

# ---------------------------------------------------------------------
# Browse categories
#
# Categories now live in their own folder: categories/<name>.yml
# The FILE NAME is the category id, so categories/weapons.yml defines "weapons".
# Add a category by dropping in a new file; remove one by deleting its file.
# Ordering in the browser's column 1 comes from each file's `priority` (lowest first).
#
# Exactly one category must be the catch-all (`match.any: true`, highest priority number)
# or items matching nothing would have nowhere to go. That's tools_misc.yml by default.
#
# If you are upgrading and still have a `categories:` block below, it is migrated into
# categories/ automatically on first start and can then be deleted.
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# Confirmation screens
#
# The irreversible actions are gated behind a confirm screen. Buy-It-Now and
# Create always had one; bids and cancellations did not - and both move real
# value on a single click (a bid holds your money until you're outbid or the
# auction ends). Turn any of them off if you prefer fewer clicks.
#
# Layouts: gui/confirm-purchase.yml, confirm-bid.yml, confirm-cancel.yml
# ---------------------------------------------------------------------
confirmations:
  bid: true
  cancel: true
  purchase: true

# ---------------------------------------------------------------------
# Item tiers (the tier filter on the browse screen)
#
# Tiers ARE eco's rarities. They are discovered automatically from
# plugins/EcoItems/rarities/*.yml, which is the eco suite's central rarity
# registry: a rarity's `items:` list can claim items from ANY eco plugin
# (ecoitems:, talismans:, reforges:, ecoarmor:, ecopets:, ecoscrolls:).
#
# That means you never define tiers here — you define them in EcoItems, and
# whatever rarity an item shows in-game is exactly what this filter sorts by.
# This section only CURATES the filter: cycle order, icons, and what to hide.
#
# The filter always starts at "No Filter" and cycles through the tiers below.
# ---------------------------------------------------------------------
tiers:
  enabled: true

  # Cycle order. Any discovered rarity not listed here is appended after these
  # (sorted by weight). 'none' is always excluded — it means "no rarity".
  order:
    - common
    - uncommon
    - rare
    - epic
    - legendary
    - mythic
    - special
    - very_special

  # Rarities to leave out of the filter entirely.
  hide: []

  # Optional icon per tier, shown on the tier filter button.
  icons:
    common: WHITE_DYE
    uncommon: LIME_DYE
    rare: BLUE_DYE
    epic: PURPLE_DYE
    legendary: ORANGE_DYE
    mythic: RED_DYE
    special: PINK_DYE
    very_special: MAGENTA_DYE


# ---------------------------------------------------------------------
# Sorting for the browse screen. Options: NEWEST, OLDEST, PRICE_LOW, PRICE_HIGH
# ---------------------------------------------------------------------
default-sort: NEWEST

# How often (in minutes) the plugin sweeps for expired listings.
expiry-sweep-minutes: 5
