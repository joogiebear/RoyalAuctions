# Confirm Purchase (Buy It Now). Placeholders: %price% %seller%

title: "&8Confirm Purchase"
rows: 3

mask:
  items:
    - gray_stained_glass_pane
  pattern:
    - "111111111"
    - "111111111"
    - "111111111"

slots:
  - id: item
    item: paper name:"&fItem"
    lore: []
    row: 2
    column: 5
    left-click: []

  - id: confirm
    item: lime_stained_glass_pane name:"&aConfirm Purchase"
    lore:
      - "&7Buy for &a%price%"
    row: 2
    column: 3
    left-click:
      - id: ah_confirm_purchase

  - id: cancel
    item: red_stained_glass_pane name:"&cCancel"
    lore:
      - "&7Return to the Auction House"
    row: 2
    column: 7
    left-click:
      - id: ah_browse

sounds:
  success:
    enabled: true
    name: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.4
