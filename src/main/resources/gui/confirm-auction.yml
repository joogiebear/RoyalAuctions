# Confirm Auction (final review before posting). Placeholders: %type% %price% %duration% %fee%

title: "&8Confirm Auction"
rows: 3

mask:
  items:
    - black_stained_glass_pane
  pattern:
    - "111111111"
    - "111111111"
    - "111111111"

slots:
  - id: item
    item: paper name:"&fItem"
    lore: []
    row: 2
    column: 5
    left-click: []

  - id: confirm
    item: lime_stained_glass_pane name:"&aConfirm Auction"
    lore:
      - "&7Post it and pay the &c%fee% &7fee"
    row: 2
    column: 3
    left-click:
      - id: ah_confirm

  - id: cancel
    item: red_stained_glass_pane name:"&cBack"
    lore:
      - "&7Return to editing"
    row: 2
    column: 7
    left-click:
      - id: ah_back
