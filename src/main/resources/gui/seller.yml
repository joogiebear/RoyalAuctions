# A single seller's auctions — the /ah <username> view.
# Placeholders: %seller% %count% %page% %pages%

title: "&8Auctions &7» &f%seller%"
rows: 6

mask:
  items:
    - gray_stained_glass_pane
  pattern:
    - "000000000"
    - "000000000"
    - "000000000"
    - "000000000"
    - "000000000"
    - "111111111"

regions:
  content-slots: "0"

slots:
  - id: prev
    item: arrow name:"&ePrevious Page"
    lore:
      - "&7Page %page%/%pages%"
    row: 6
    column: 1
    left-click:
      - id: ah_prev_page

  - id: back
    item: oak_door name:"&eBack to Auction House"
    lore: []
    row: 6
    column: 4
    left-click:
      - id: ah_hub

  - id: info
    item: player_head name:"&e%seller%'s Auctions"
    lore:
      - "&7Listings: &f%count%"
      - "&7Page: &f%page%/%pages%"
    row: 6
    column: 5
    left-click: []

  - id: close
    item: barrier name:"&cClose"
    lore: []
    row: 6
    column: 6
    left-click:
      - id: close_inventory

  - id: next
    item: arrow name:"&eNext Page"
    lore:
      - "&7Page %page%/%pages%"
    row: 6
    column: 9
    left-click:
      - id: ah_next_page
