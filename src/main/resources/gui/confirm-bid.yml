# Confirm Bid. Shown before a bid is placed (disable with confirmations.bid: false in config.yml).
# Placeholders: %bid% %current_bid% %seller% %balance%

title: "&8Confirm Bid"
rows: 3

mask:
  items:
    - gray_stained_glass_pane
  pattern:
    - "111111111"
    - "111111111"
    - "111111111"

slots:
  - id: item
    item: paper name:"&fItem"
    lore: []
    location:
      row: 2
      column: 5
    left-click: []

  - id: confirm
    item: lime_stained_glass_pane name:"&aConfirm Bid"
    lore:
      - "&7Bid &e%bid%"
      - ""
      - "&7Your balance: &f%balance%"
      - ""
      - "&8Your money is held until you are"
      - "&8outbid or the auction ends."
    location:
      row: 2
      column: 3
    left-click:
      - id: ah_confirm_bid

  - id: cancel
    item: red_stained_glass_pane name:"&cBack"
    lore:
      - "&7Return without bidding."
    location:
      row: 2
      column: 7
    left-click:
      - id: ah_back
