# Collection: purchases (that didn't fit) and expired/cancelled listings waiting to be claimed.
# Placeholders: %count% %page% %pages%

title: "&8Auction House &7» &fCollection"
rows: 6

# Sounds this menu plays. enabled: false silences one without deleting it.
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2

mask:
  items:
    - black_stained_glass_pane
  pattern:
    - "000000000"
    - "000000000"
    - "000000000"
    - "000000000"
    - "000000000"
    - "111111111"

regions:
  content-slots: "0"

slots:
  - id: prev
    item: arrow name:"&ePrevious Page"
    lore:
      - "&7Page %page%/%pages%"
    row: 6
    column: 1
    left-click:
      - id: ah_prev_page

  - id: back
    item: arrow name:"&7« Back"
    lore: []
    row: 6
    column: 4
    left-click:
      - id: ah_hub

  - id: info
    item: ender_chest hide_attributes name:"&eCollection"
    lore:
      - "&7Items: &f%count%"
      - "&7Page: &f%page%/%pages%"
    row: 6
    column: 5
    left-click: []

  - id: close
    item: barrier name:"&cClose"
    lore: []
    row: 6
    column: 6
    left-click:
      - id: close_inventory

  - id: next
    item: arrow name:"&eNext Page"
    lore:
      - "&7Page %page%/%pages%"
    row: 6
    column: 9
    left-click:
      - id: ah_next_page
