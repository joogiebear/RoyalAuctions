# Place Bid. Placeholders: %min_bid% %current_bid% %seller%

title: "&8Place Bid"
rows: 3

# Sounds this menu plays. enabled: false silences one without deleting it.
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2

mask:
  items:
    - black_stained_glass_pane
  pattern:
    - "111111111"
    - "111111111"
    - "111111111"

slots:
  - id: item
    item: paper name:"&fItem"
    lore: []
    row: 2
    column: 5
    left-click: []

  - id: bid-min
    item: lime_stained_glass_pane name:"&aBid %min_bid%"
    lore:
      - "&7The minimum next bid"
    row: 2
    column: 3
    left-click:
      - id: ah_bid_min

  - id: bid-custom
    item: oak_sign name:"&eCustom Amount"
    lore:
      - "&7Type your own bid in chat"
    row: 2
    column: 7
    left-click:
      - id: ah_bid_custom

  - id: back
    item: arrow name:"&7« Back"
    lore:
      - "&7Return to the Auction House"
    row: 3
    column: 5
    left-click:
      - id: ah_browse
