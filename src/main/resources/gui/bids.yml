# View Bids — every active auction you've bid on, marked TOP BIDDER or OUTBID.
# Being outbid means you were already refunded, so nothing is at stake — click to re-bid.
# Placeholders: %count% %top% %outbid% %page% %pages%

title: "&8Auction House &7» &fYour Bids"
rows: 6

mask:
  items:
    - black_stained_glass_pane
  pattern:
    - "000000000"
    - "000000000"
    - "000000000"
    - "000000000"
    - "000000000"
    - "111111111"

regions:
  content-slots: "0"

slots:
  - id: prev
    item: arrow name:"&ePrevious Page"
    lore:
      - "&7Page %page%/%pages%"
    row: 6
    column: 1
    left-click:
      - id: ah_prev_page

  - id: back
    item: arrow name:"&7« Back"
    lore: []
    row: 6
    column: 4
    left-click:
      - id: ah_hub

  - id: info
    item: gold_ingot hide_attributes name:"&eYour Bids"
    lore:
      - "&7Top bidder on &a%top% &7of &f%count%"
      - "&7Outbid: &c%outbid%"
      - "&7Page: &f%page%/%pages%"
    row: 6
    column: 5
    left-click: []

  - id: close
    item: barrier name:"&cClose"
    lore: []
    row: 6
    column: 6
    left-click:
      - id: close_inventory

  - id: next
    item: arrow name:"&eNext Page"
    lore:
      - "&7Page %page%/%pages%"
    row: 6
    column: 9
    left-click:
      - id: ah_next_page
