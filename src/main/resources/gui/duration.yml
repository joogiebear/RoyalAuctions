# Auction Duration. The duration buttons are generated from listings.durations in config.yml
# and placed into the "duration-slots" region (marked D in the mask), in order.

title: "&8Auction Duration"
rows: 3

# Sounds this menu plays. enabled: false silences one without deleting it.
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2

mask:
  items:
    - black_stained_glass_pane
  pattern:
    - "111111111"
    - "DDDDDDD11"
    - "111111111"

regions:
  duration-slots: "D"

slots:
  - id: back
    item: arrow name:"&7« Back"
    lore:
      - "&7Return to Create Auction"
    row: 3
    column: 5
    left-click:
      - id: ah_back
